<!DOCTYPE html>
<html>
<head>
  <title>Create New Ingredient</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://i.pinimg.com/1200x/a5/0a/69/a50a6990e07b1cc241950b1c9967ad19.jpg') center / cover no-repeat fixed;
      padding: 40px 20px;
      position: relative;
      box-sizing: border-box; 
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(2px);
      z-index: -1; 
    }

    .main-container{
      position:relative;
      z-index:2;
      min-height:100vh;
    }

    .header-card {
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    .header-card h1 {
      font-weight: 700;
      margin: 0;
      color: #333;
    }

    .header-card p {
      margin: 0;
      color: #666;
    }

    form{
      width:100%;
      max-width:500px;
      background:rgba(255,255,255,0.96);
      padding:35px;
      border-radius:20px;
      box-shadow:0 10px 35px rgba(0,0,0,0.2);
    }

    .form-label{
      font-weight:600;
      font-size:14px;
    }

    .form-control {
      border-radius: 10px;
      padding: 12px 10px !important;
    }

    /* FIX: Overlap resolution styling constraints for standalone select */
    .form-select {
      border-radius: 10px;
      padding: 12px 30px 12px 12px !important; /* Retains text separation from right arrow */
      background-position: right 0.75rem center !important; 
    }

    .btn-primary{
      background:#d96b3c;
      border:none;
      padding:12px;
      border-radius:10px;
      font-weight:600;
    }

    .btn-primary:hover{
      background:#c85d30;
    }

    .stock-status-label {
      display: block;
      margin-bottom: 8px; 
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <div class="container main-container d-flex flex-column justify-content-center align-items-center">

  <div class="header-card">
    <h1>CREATE NEW INGREDIENT</h1>
    <p>Share your culinary masterpiece with the world!</p>
  </div>

  <form method="POST" class="post-form" action="" novalidate>
      {% csrf_token %}

      <h3 class="mb-4">Enter Details</h3>

      <div class="mb-3">
          <label class="form-label">Ingredient Name:</label>
          {{ form.name }}
      </div>

      <div class="row mb-3">
          <div class="col-6">
              <label class="form-label">Quantity:</label>
              {{ form.quantity }}
          </div>
          <div class="col-6">
              <label class="form-label">Unit:</label>
              {{ form.unit }}
          </div>
      </div>
      
      <div class="mb-3">
          <label class="form-label">Price:</label>
          {{ form.price }}
      </div>

      <div class="mb-4">
          <label class="form-label">Stock Status:</label>
          {{ form.stock_status }}
      </div>  

      <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-plus-circle me-2"></i>
          Submit Ingredients
      </button>

  </form>  

</div>

</body>
</html>
