<!DOCTYPE html>
<html lang="en">
<head>
    <title>CookWise - Update Ingredient</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --primary-orange: #d96b3c;
            --hover-orange: #c85d30;
            --text-dark: #333;
            --text-muted: #666;
            --border-radius: 18px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: url('https://i.pinimg.com/1200x/a5/0a/69/a50a6990e07b1cc241950b1c9967ad19.jpg') center / cover no-repeat fixed;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(1.5px);
            z-index: 1;
        }

        .app-shell {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .gourmet-header {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 550px;
            margin: 0 auto 30px auto;
        }

        .gourmet-header .app-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--primary-orange);
            margin: 0;
            font-weight: 700;
        }

        .gourmet-header .recipe-title {
            font-weight: 700;
            margin: 5px 0 0 0;
            color: var(--text-dark);
            font-size: 28px;
        }

        .polished-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        .card-header-with-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .card-header-title {
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
            font-size: 20px;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #e0e0e0;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 0.2rem rgba(217, 107, 60, 0.25);
        }

        .btn-orange {
            background: var(--primary-orange);
            color: white;
            border: none;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .btn-orange:hover {
            background: var(--hover-orange);
            color: white;
        }
    </style>
</head>

<body>

    <div class="app-shell container-fluid">

        <header class="gourmet-header">
            <h1 class="app-title">CookWise</h1>
            <h2 class="recipe-title">EDIT INGREDIENT</h2>
        </header>

        <div class="d-flex flex-grow-1 align-items-center justify-content-center">
            <form method="POST" class="post-form polished-card" action="{% url 'update_ingredient' ingredient.id %}" novalidate>  
                {% csrf_token %}  
                
                <div class="card-header-with-actions">
                    <h3 class="card-header-title">Update Details</h3>
                </div>
                
                <input type="hidden" name="recipeid" id="id_recipeid" value="{{ ingredient.recipeid_id }}" />

                <div class="mb-3">
                    <label class="form-label" for="id_name">Ingredient Name:</label>
                    <input type="text" name="name" id="id_name" class="form-control" required maxlength="100" value="{{ ingredient.name }}" />
                </div>

                <div class="row mb-3">
                    <div class="col-6">
                        <label class="form-label" for="id_quantity">Quantity:</label>
                        <input type="number" name="quantity" id="id_quantity" class="form-control" required min="0" value="{{ ingredient.quantity }}" />
                    </div>
                    <div class="col-6">
                        <label class="form-label" for="id_unit">Unit:</label>
                        <select name="unit" id="id_unit" class="form-select" required>
                            <option value="g" {% if ingredient.unit == 'g' %}selected{% endif %}>Grams (g)</option>
                            <option value="kg" {% if ingredient.unit == 'kg' %}selected{% endif %}>Kilograms (kg)</option>
                            <option value="ml" {% if ingredient.unit == 'ml' %}selected{% endif %}>Milliliters (ml)</option>
                            <option value="l" {% if ingredient.unit == 'l' %}selected{% endif %}>Liters (l)</option>
                            <option value="pcs" {% if ingredient.unit == 'pcs' or not ingredient.unit %}selected{% endif %}>Pieces (pcs)</option>
                            <option value="tbsp" {% if ingredient.unit == 'tbsp' %}selected{% endif %}>Tablespoon (tbsp)</option>
                            <option value="tsp" {% if ingredient.unit == 'tsp' %}selected{% endif %}>Teaspoon (tsp)</option>
                            <option value="cup" {% if ingredient.unit == 'cup' %}selected{% endif %}>Cup (cup)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="id_price">Price:</label>
                    <input type="text" name="price" id="id_price" class="form-control" required maxlength="200" value="{{ ingredient.price }}" />
                </div>

                <div class="mb-4">
                    <label class="form-label" for="id_stock_status">Stock Status:</label>
                    <input type="text" name="stock_status" id="id_stock_status" class="form-control" required maxlength="20" value="{{ ingredient.stock_status }}" />
                </div>

                <button type="submit" class="btn btn-orange w-100">
                    <i class="bi bi-cloud-upload me-2"></i>
                    Update Ingredient
                </button>
            </form>
        </div>

    </div> 
</body>
</html>
