<!DOCTYPE html>
<html lang="en">
<head>
    <title>CookWise - Update Cooking Transaction</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --primary-orange: #d96b3c;
            --hover-orange: #c85d30;
            --text-dark: #333;
            --text-muted: #666;
            --border-radius: 18px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: url('https://i.pinimg.com/1200x/a5/0a/69/a50a6990e07b1cc241950b1c9967ad19.jpg') center / cover no-repeat fixed;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(1.5px);
            z-index: 1;
        }

        .app-shell {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .gourmet-header {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 550px; 
            margin: 0 auto 30px auto; 
        }

        .gourmet-header .app-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--primary-orange);
            margin: 0;
            font-weight: 700;
        }

        .gourmet-header .recipe-title {
            font-weight: 700;
            margin: 5px 0 0 0;
            color: var(--text-dark);
            font-size: 24px;
        }

        .polished-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
        }

        .card-header-with-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }

        .card-header-title {
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
            font-size: 20px;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: var(--text-dark);
        }

        /* Star Rating UI Rules */
        .star-rating {
            display: flex;
            gap: 8px;
            font-size: 30px;
        }

        .star-rating i {
            color: #ccc;
            cursor: pointer;
            transition: color 0.1s ease-in-out;
        }

        .star-rating i.active {
            color: #ffc107 !important;
        }

        .btn-orange {
            background: var(--primary-orange);
            color: white;
            border: none;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 10px;
            transition: background 0.2s;
        }

        .btn-orange:hover {
            background: var(--hover-orange);
            color: white;
        }
    </style>
</head>

<body>

    <div class="app-shell container-fluid">

        <header class="gourmet-header">
            <h1 class="app-title">CookWise</h1>
            <h2 class="recipe-title">EDIT TRANSACTION</h2>
        </header>

        <div class="d-flex flex-grow-1 align-items-center justify-content-center">
            <form method="POST" class="post-form polished-card" action="{% url 'update_cooking_transaction' id=cooking_transaction.id %}"> 
                {% csrf_token %} 
                
                <div class="card-header-with-actions">
                    <h3 class="card-header-title">Update Details</h3>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Recipe Being Updated:</label>
                    <input type="text" class="form-control text-muted" value="{{ cooking_transaction.recipeid.name }}" readonly disabled />
                </div>

                {{ form.recipeid }}
                {{ form.date_cooked.as_hidden }}
                {{ form.rating }}

                <div class="mb-4">
                    <label class="form-label d-block">Modify Rating:</label>
                    <div class="star-rating" id="starContainer">
                        <i class="bi bi-star-fill" data-value="1"></i>
                        <i class="bi bi-star-fill" data-value="2"></i>
                        <i class="bi bi-star-fill" data-value="3"></i>
                        <i class="bi bi-star-fill" data-value="4"></i>
                        <i class="bi bi-star-fill" data-value="5"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-orange w-100">
                    <i class="bi bi-cloud-upload me-2"></i>
                    Update Cooking Transaction
                </button>
            </form> 
        </div>

    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const stars = Array.from(document.querySelectorAll("#starContainer i"));
            const ratingInput = document.getElementById("id_rating");

            // Automatically read the existing database value and update the visual highlights
            const savedValue = parseInt(ratingInput.value) || 5;
            updateStars(savedValue);

            stars.forEach(star => {
                star.addEventListener("click", function () {
                    const selectedValue = parseInt(this.getAttribute("data-value"));
                    ratingInput.value = selectedValue;
                    updateStars(selectedValue);
                });
            });

            function updateStars(clickedValue) {
                stars.forEach(star => {
                    const starValue = parseInt(star.getAttribute("data-value"));
                    if (starValue <= clickedValue) {
                        star.classList.add("active");
                    } else {
                        star.classList.remove("active");
                    }
                });
            }
        });
    </script>
</body>
</html>
