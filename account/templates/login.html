<!DOCTYPE html>
<html lang="en">
<head>
    <title>CookWise - Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --primary-orange: #d96b3c;
            --hover-orange: #c85d30;
            --text-dark: #333;
            --text-muted: #666;
            --border-radius: 18px;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: url('https://i.pinimg.com/1200x/a5/0a/69/a50a6990e07b1cc241950b1c9967ad19.jpg') center / cover no-repeat fixed;
            position: relative;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(1.5px);
            z-index: 1;
        }

        .app-shell {
            position: relative;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .gourmet-header {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            padding: 15px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 480px; 
            margin: 40px auto 20px auto; 
        }

        .gourmet-header .app-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--primary-orange);
            margin: 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .gourmet-header .recipe-title {
            font-weight: 600;
            margin: 5px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .polished-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: var(--border-radius);
            padding: 40px 35px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 480px;
            margin: 0 auto 40px auto;
        }

        .card-header-with-actions {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #f8f9fa;
            padding-bottom: 15px;
        }

        .card-header-title {
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
            font-size: 22px;
        }

        /* Form Controls Overrides for Premium Aesthetic */
        .form-control:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 0.25rem rgba(217, 107, 60, 0.15);
        }

        .btn-orange {
            background: var(--primary-orange);
            color: white;
            border: none;
            font-weight: 600;
            padding: 14px 20px;
            border-radius: 10px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-orange:hover {
            background: var(--hover-orange);
            color: white;
        }

        .btn-orange:active {
            transform: scale(0.98);
        }

        .form-link {
            color: var(--primary-orange);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .form-link:hover {
            color: var(--hover-orange);
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="app-shell container-fluid">

        <header class="gourmet-header">
            <h1 class="app-title">CookWise</h1>
            <h2 class="recipe-title">Welcome Back</h2>
        </header>

        <div class="d-flex flex-grow-1 align-items-center justify-content-center">
            <form method="POST" class="post-form polished-card" action="{% url 'login' %}"> 
                {% csrf_token %} 
                
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} p-2 small text-center mb-3">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <div class="card-header-with-actions">
                    <h3 class="card-header-title">Sign In</h3>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text bg-light border-end-0 text-muted">
                        <i class="bi bi-person"></i>
                    </span>
                    <div class="form-floating flex-grow-1">
                        <input type="text" name="username" class="form-control border-start-0 ps-0" id="id_username" placeholder="Username" required>
                        <label for="id_username">Username</label>
                    </div>
                </div>
                
                <div class="input-group mb-3">
                    <span class="input-group-text bg-light border-end-0 text-muted">
                        <i class="bi bi-envelope"></i>
                    </span>
                    <div class="form-floating flex-grow-1">
                        <input type="email" name="email" class="form-control border-start-0 ps-0" id="id_email" placeholder="Email address" required>
                        <label for="id_email">Email Address</label>
                    </div>
                </div>

                <div class="input-group mb-4">
                    <span class="input-group-text bg-light border-end-0 text-muted">
                        <i class="bi bi-lock"></i>
                    </span>
                    <div class="form-floating flex-grow-1">
                        <input type="password" name="password" class="form-control border-start-0 ps-0" id="id_password" placeholder="Password" required>
                        <label for="id_password">Password</label>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                        <label class="form-check-label text-muted small" for="rememberMe">
                            Remember me
                        </label>
                    </div>
                    <a href="#" class="form-link small">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-orange w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Sign In
                </button>

                <div class="text-center mt-3">
                    <span class="text-muted small">Don't have an account? </span>
                    <a href="{% url 'signup' %}" class="form-link small">Create Account</a>
                </div>
            </form> 
        </div>

    </div> 

</body>
</html>
